<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#0b111e">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<title>English Teacher</title>
<link rel="manifest" href="/manifest.json">
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  :root{
    --bg:#0b111e;--card:#111827;--sidebar:#080d17;--hover:#161f30;
    --t1:#e2e8f0;--t2:#94a3b8;--t3:#64748b;--t4:#334155;
    --bd:#1e293b;--bds:#334155;--ub:#1a2540;--accent:#60a5fa;
  }
  .light{
    --bg:#f0f4f8;--card:#fff;--sidebar:#e4eaf2;--hover:#dce4ef;
    --t1:#0f172a;--t2:#475569;--t3:#6b7280;--t4:#9ca3af;
    --bd:#d1dae8;--bds:#b8c5d6;--ub:#e8edf5;
  }
  body{font-family:'Inter',system-ui,sans-serif;background:var(--bg);color:var(--t1);height:100dvh;display:flex;flex-direction:column;overflow:hidden}
  header{display:flex;justify-content:space-between;align-items:center;padding:.65rem 1.25rem;border-bottom:1px solid var(--bd);background:var(--bg);position:sticky;top:0;z-index:20;flex-shrink:0}
  .logo{display:flex;align-items:center;gap:.5rem;font-weight:700;font-size:.95rem;letter-spacing:-.01em}
  .hdr-right{display:flex;align-items:center;gap:.45rem}
  .pill{padding:.3rem .85rem;border-radius:20px;font-size:.74rem;font-weight:500;border:1px solid var(--bds);background:transparent;color:var(--t3);cursor:pointer;transition:all .15s;font-family:inherit}
  .pill.on{border-color:var(--accent);background:color-mix(in srgb,var(--accent) 15%,transparent);color:var(--accent)}
  .tabs{display:flex;border-bottom:1px solid var(--bd);background:var(--bg);overflow-x:auto;flex-shrink:0;scrollbar-width:none}
  .tabs::-webkit-scrollbar{display:none}
  .tab{display:flex;align-items:center;gap:.35rem;padding:.7rem 1rem;font-size:.78rem;font-weight:500;border:none;border-bottom:2px solid transparent;background:transparent;color:var(--t3);cursor:pointer;white-space:nowrap;transition:all .15s;font-family:inherit}
  .tab.on{color:var(--accent);border-bottom-color:var(--accent)}
  .main{display:flex;flex:1;overflow:hidden}
  aside{width:235px;min-width:190px;background:var(--sidebar);border-right:1px solid var(--bd);display:flex;flex-direction:column;flex-shrink:0}
  .sidebar-head{display:flex;justify-content:space-between;align-items:center;padding:.65rem .875rem;border-bottom:1px solid var(--bd)}
  .sidebar-head span{font-size:.75rem;font-weight:600;color:var(--t2)}
  .sidebar-body{flex:1;overflow-y:auto;padding:.35rem}
  .hist-item{padding:.55rem .65rem;border-radius:8px;cursor:pointer;margin-bottom:.2rem;border:1px solid transparent;transition:all .12s}
  .hist-item:hover{background:var(--hover)}
  .hist-item.active{border-color:var(--bds);background:var(--card)}
  .hist-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:.2rem}
  .hist-mod{font-size:.69rem;font-weight:600}
  .hist-time{font-size:.62rem;color:var(--t4)}
  .hist-btns{display:flex;gap:.15rem}
  .hist-btns button{background:none;border:none;cursor:pointer;font-size:.65rem;padding:0 .1rem;line-height:1}
  .hist-name{font-size:.74rem;color:var(--t2);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .hist-name-input{width:100%;font-size:.75rem;background:var(--card);border:1px solid var(--bds);border-radius:4px;color:var(--t1);padding:.15rem .35rem;outline:none;font-family:inherit}
  .hist-badge{font-size:.6rem;color:var(--t3);background:var(--hover);border-radius:8px;padding:0 .3rem}
  .content{flex:1;display:flex;flex-direction:column;overflow:hidden}
  .convo{flex:1;overflow-y:auto;padding:1rem;display:flex;flex-direction:column;gap:1rem}
  .empty{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:2rem 1rem;opacity:.65}
  .empty-icon{font-size:2.5rem;margin-bottom:.75rem}
  .empty-title{font-size:1.1rem;font-weight:700;margin-bottom:.5rem}
  .empty-hint{color:var(--t3);font-size:.82rem;max-width:260px;margin-bottom:.75rem}
  .empty-key{color:var(--t4);font-size:.72rem;border:1px solid var(--bd);border-radius:8px;padding:.25rem .75rem}
  .exchange{display:flex;flex-direction:column;gap:.5rem}
  .user-bubble{display:flex;justify-content:flex-end}
  .user-bubble-inner{max-width:80%;background:var(--ub);border:1px solid var(--bds);border-radius:12px 12px 4px 12px;padding:.6rem .875rem}
  .user-text{color:var(--t1);font-size:.85rem;line-height:1.6}
  .assistant-card{background:var(--card);border:1px solid var(--bd);border-radius:4px 12px 12px 12px;overflow:hidden}
  .assistant-head{display:flex;align-items:center;gap:.4rem;padding:.5rem 1rem;border-bottom:1px solid var(--bd)}
  .assistant-head-mod{font-size:.72rem;font-weight:600}
  .clean-badge{font-size:.65rem;color:#fbbf24;background:rgba(251,191,36,.1);border-radius:8px;padding:.1rem .4rem}
  .assistant-body{padding:.875rem 1rem}
  /* ACTION BUTTONS (copy, tts) */
  .action-bar{display:flex;gap:.4rem;padding:.4rem .75rem;border-top:1px solid var(--bd);background:var(--card)}
  .act-btn{display:flex;align-items:center;gap:.3rem;background:transparent;border:1px solid var(--bds);border-radius:8px;color:var(--t3);cursor:pointer;padding:.25rem .65rem;font-size:.72rem;font-family:inherit;transition:all .15s}
  .act-btn:hover{color:var(--t2);border-color:var(--t3)}
  .act-btn.copied{color:#34d399;border-color:#34d399}
  /* TTS PANEL */
  .tts-panel{padding:.65rem 1rem;border-top:1px solid var(--bd);background:var(--card);display:none;flex-direction:column;gap:.5rem}
  .tts-panel.open{display:flex}
  .tts-row{display:flex;align-items:center;gap:.5rem;flex-wrap:wrap}
  .tts-label{font-size:.72rem;color:var(--t3);min-width:52px}
  .tts-select{background:var(--bg);border:1px solid var(--bds);border-radius:6px;color:var(--t2);padding:.25rem .5rem;font-size:.72rem;font-family:inherit;flex:1;min-width:0}
  .tts-range{flex:1;min-width:80px}
  .tts-val{font-size:.7rem;color:var(--t3);min-width:36px;text-align:right}
  .tts-play{padding:.3rem .9rem;border-radius:8px;border:none;color:#fff;font-size:.78rem;font-weight:600;cursor:pointer;font-family:inherit;transition:opacity .15s}
  .tts-play:disabled{opacity:.45;cursor:not-allowed}
  .tts-stop{padding:.3rem .7rem;border-radius:8px;border:1px solid var(--bds);background:transparent;color:var(--t3);font-size:.78rem;cursor:pointer;font-family:inherit;display:none}
  /* DOTS */
  .dots{display:flex;gap:.4rem;padding:.5rem 0;align-items:center}
  .dot{width:7px;height:7px;border-radius:50%;animation:blink 1.1s ease-in-out infinite}
  @keyframes blink{0%,100%{opacity:.3;transform:scale(.82)}50%{opacity:1;transform:scale(1)}}
  /* MARKDOWN */
  .md h1{font-size:1rem;font-weight:700;margin:.9rem 0 .25rem;color:var(--accent)}
  .md h2{font-size:.9rem;font-weight:600;margin:.85rem 0 .2rem;color:var(--accent)}
  .md h3{font-size:.82rem;font-weight:600;margin:.8rem 0 .15rem;color:var(--accent)}
  .md p{color:var(--t2);font-size:.85rem;line-height:1.7;margin:0 0 .15rem}
  .md strong{color:var(--t1);font-weight:600}
  .md hr{border:none;border-top:1px solid var(--bd);margin:.75rem 0}
  .md .li{display:flex;gap:.45rem;margin-bottom:.2rem}
  .md .li-bullet{font-size:.65rem;margin-top:.35rem;flex-shrink:0;color:var(--accent)}
  .md .li-num{font-weight:600;font-size:.85rem;min-width:1.2rem;flex-shrink:0;color:var(--accent)}
  .md .li span{color:var(--t2);font-size:.85rem;line-height:1.65}
  /* CLEAN TRANSLATION */
  .clean-trans{font-size:.95rem;line-height:2;color:var(--t1)}
  .clean-trans .tr-line{display:flex;align-items:baseline;gap:.5rem;padding:.15rem 0;border-bottom:1px solid var(--bd)}
  .clean-trans .tr-line:last-child{border-bottom:none}
  .clean-trans .tr-en{font-weight:600;color:var(--accent)}
  .clean-trans .tr-dash{color:var(--t4)}
  .clean-trans .tr-uk{color:var(--t1)}
  /* INPUT */
  .input-area{padding:.75rem 1rem;border-top:1px solid var(--bd);background:var(--bg);flex-shrink:0}
  .convo-meta{display:flex;justify-content:space-between;align-items:center;margin-bottom:.5rem}
  .convo-meta span{font-size:.72rem;color:var(--t3)}
  .new-btn{font-size:.72rem;color:var(--t3);background:transparent;border:1px solid var(--bds);border-radius:8px;padding:.2rem .6rem;cursor:pointer;font-family:inherit}
  .input-card{background:var(--card);border:1px solid var(--bd);border-radius:12px;overflow:hidden}
  .img-preview{padding:.6rem .875rem 0;display:flex;align-items:flex-start;gap:.5rem}
  .img-thumb{width:44px;height:44px;object-fit:cover;border-radius:6px;border:1px solid var(--bds)}
  .rm-img{background:var(--sidebar);border:none;border-radius:50%;color:var(--t3);cursor:pointer;width:18px;height:18px;font-size:.6rem;display:flex;align-items:center;justify-content:center}
  textarea{width:100%;background:transparent;border:none;outline:none;color:var(--t1);font-size:.875rem;line-height:1.65;padding:.75rem 1rem;resize:none;font-family:inherit}
  textarea::placeholder{color:var(--t4)}
  .input-foot{display:flex;justify-content:space-between;align-items:center;padding:.45rem .875rem;border-top:1px solid var(--bd)}
  .input-left{display:flex;align-items:center;gap:.5rem}
  .attach-btn{background:transparent;border:1px solid var(--bds);border-radius:8px;color:var(--t3);cursor:pointer;padding:.25rem .6rem;font-size:.75rem;font-family:inherit}
  .hint-key{font-size:.68rem;color:var(--t4)}
  .send-btn{padding:.38rem 1rem;border-radius:8px;border:none;color:#fff;font-weight:600;font-size:.82rem;cursor:pointer;font-family:inherit;transition:opacity .15s}
  .send-btn:disabled{opacity:.4;cursor:not-allowed}
  ::-webkit-scrollbar{width:3px}
  ::-webkit-scrollbar-thumb{background:var(--bds);border-radius:2px}
  .icon-btn{background:transparent;border:1px solid var(--bds);border-radius:20px;color:var(--t3);cursor:pointer;padding:.3rem .65rem;font-size:.82rem;font-family:inherit}
</style>
</head>
<body>

<header>
  <div class="logo"><span>🇬🇧</span><span>English Teacher</span></div>
  <div class="hdr-right">
    <button class="pill" id="hist-btn" onclick="toggleHistory()">📋 Історія</button>
    <button class="pill" id="clean-btn" onclick="toggleClean()">📝 Детально</button>
    <button class="icon-btn" id="theme-btn" onclick="toggleTheme()">☀️</button>
  </div>
</header>

<div class="tabs" id="tabs"></div>

<div class="main">
  <aside id="sidebar" style="display:none">
    <div class="sidebar-head">
      <span>Історія</span>
      <button class="icon-btn" onclick="toggleHistory()" style="border:none;padding:.1rem .3rem">✕</button>
    </div>
    <div class="sidebar-body" id="hist-list"></div>
  </aside>
  <div class="content">
    <div class="convo" id="convo"></div>
    <div class="input-area">
      <div class="convo-meta" id="convo-meta" style="display:none">
        <span id="turn-count"></span>
        <button class="new-btn" onclick="newConvo()">+ Новий діалог</button>
      </div>
      <div class="input-card" id="input-card">
        <div class="img-preview" id="img-preview" style="display:none">
          <img class="img-thumb" id="img-thumb" src="" alt="">
          <button class="rm-img" onclick="clearImage()">✕</button>
        </div>
        <textarea id="input-box" rows="3" placeholder="" onkeydown="onKey(event)"></textarea>
        <div class="input-foot">
          <div class="input-left">
            <button class="attach-btn" onclick="document.getElementById('file-input').click()">📎 Фото</button>
            <span class="hint-key">Ctrl+V · Ctrl+Enter</span>
          </div>
          <button class="send-btn" id="send-btn" onclick="send()">Запитати →</button>
        </div>
        <input type="file" id="file-input" accept="image/*" style="display:none" onchange="onFileSelect(event)">
      </div>
    </div>
  </div>
</div>

<script>
const API = window.location.origin;

const MODULES = [
  {id:"grammar",    label:"Граматика",     icon:"📚", color:"#60a5fa", tts:false,
   ph:'Запитайте про граматичне правило...\nПриклад: "Поясни Present Perfect"',
   fu:"Уточніть деталь або запитайте додатково..."},
  {id:"translation",label:"Переклад",      icon:"📖", color:"#34d399", tts:false,
   ph:'Введіть слово, фразу або ідіому...\nПриклад: "to bite the bullet"',
   fu:"Запитайте про інше слово або уточніть..."},
  {id:"exercises",  label:"Завдання",      icon:"✏️", color:"#c084fc", tts:false,
   ph:"Вставте завдання для виконання...\nПриклад: вправа на вибір часів",
   fu:"Запитайте про конкретний пункт..."},
  {id:"ielts",      label:"IELTS Speaking",icon:"🎙️", color:"#fb923c", tts:true,
   ph:'Вкажіть тему та частину IELTS...\nПриклад: "Part 2: Describe a place"',
   fu:"Запитайте варіант на іншу тему або продовжте..."},
  {id:"tips",       label:"Техніки",       icon:"🚀", color:"#f87171", tts:false,
   ph:'Запитайте про техніки навчання...\nПриклад: "Як швидко покращити speaking?"',
   fu:"Уточніть або запитайте конкретну техніку..."},
];

const HINTS = [
  "Запитайте про будь-яке граматичне правило",
  "Введіть слово або ідіому — нормалізуємо та перекладемо",
  "Вставте завдання — виконаємо з повним поясненням",
  "Вкажіть тему IELTS Speaking для тексту shadowing",
  "Запитайте про техніки вивчення англійської",
];

// ── STATE ────────────────────────────────────────────────────────────────────
let modIdx   = 0, dark = true, cleanMode = false, showHist = false;
let messages = [], convo = [], loading = false;
let activeId = null, history = JSON.parse(localStorage.getItem("et4-history") || "[]");
let imageB64 = null, imageMime = null, editingId = null;
let ttsVoices = {}, currentAudio = null, ttsState = {};  // per-card TTS state

// ── INIT ─────────────────────────────────────────────────────────────────────
async function init() {
  renderTabs(); renderConvo(); renderHistory(); applyTheme(); applyModule();
  checkServer();
  // Load TTS voices
  try {
    const r = await fetch(`${API}/api/tts/voices`);
    const d = await r.json();
    ttsVoices = d.voices || {};
  } catch {}
}

async function checkServer() {
  try {
    const r = await fetch(`${API}/api/health`);
    if (!r.ok) throw new Error();
    const d = await r.json();
    if (!d.api_key_set) showToast("⚠️ API ключ не налаштовано — відкрийте .env файл");
    if (!d.tts_ready)   showToast("ℹ️ TTS недоступний — run: pip install edge-tts", 5000);
  } catch { showToast("⚠️ Сервер недоступний — запустіть python start.py"); }
}

// ── TABS ─────────────────────────────────────────────────────────────────────
function renderTabs() {
  document.getElementById("tabs").innerHTML = MODULES.map((m,i) =>
    `<button class="tab${i===modIdx?" on":""}" style="${i===modIdx?`--accent:${m.color}`:""}"
      onclick="switchModule(${i})">${m.icon} ${m.label}</button>`
  ).join("");
}
function switchModule(i) { modIdx=i; newConvo(); renderTabs(); applyModule(); }
function applyModule() {
  const m = MODULES[modIdx];
  document.documentElement.style.setProperty("--accent", m.color);
  document.getElementById("input-card").style.boxShadow = `0 0 24px ${m.color}18`;
  document.getElementById("input-box").placeholder = convo.length ? m.fu : m.ph;
  document.getElementById("send-btn").style.background = m.color;
}

// ── THEME ─────────────────────────────────────────────────────────────────────
function toggleTheme() { dark=!dark; applyTheme(); }
function applyTheme() {
  document.body.className = dark ? "" : "light";
  document.getElementById("theme-btn").textContent = dark ? "☀️" : "🌙";
}

// ── CLEAN MODE ────────────────────────────────────────────────────────────────
function toggleClean() {
  cleanMode = !cleanMode;
  const b = document.getElementById("clean-btn");
  b.textContent = cleanMode ? "⚡ Чистий" : "📝 Детально";
  b.classList.toggle("on", cleanMode);
}

// ── HISTORY ───────────────────────────────────────────────────────────────────
function toggleHistory() {
  showHist = !showHist;
  document.getElementById("sidebar").style.display = showHist ? "" : "none";
  document.getElementById("hist-btn").classList.toggle("on", showHist);
}
function saveHistory() { localStorage.setItem("et4-history", JSON.stringify(history.slice(0,100))); }

function renderHistory() {
  const el = document.getElementById("hist-list");
  if (!history.length) { el.innerHTML='<p style="text-align:center;color:var(--t4);font-size:.75rem;padding:1.5rem 0">Ще немає запитів</p>'; return; }
  el.innerHTML = history.map(item => {
    const m = MODULES[item.modIdx], turns = item.convo?.length||1;
    return `<div class="hist-item${item.id===activeId?" active":""}" onclick="loadItem(${item.id})" id="hi-${item.id}">
      <div class="hist-head">
        <span class="hist-mod" style="color:${m.color}">${m.icon} ${m.label}</span>
        <div style="display:flex;align-items:center;gap:.3rem">
          <span class="hist-time">${item.time}</span>
          ${turns>1?`<span class="hist-badge">${turns}</span>`:""}
          <div class="hist-btns">
            <button title="Перейменувати" onclick="startRename(event,${item.id})">✏️</button>
            <button title="Видалити" style="color:#f87171" onclick="deleteItem(event,${item.id})">✕</button>
          </div>
        </div>
      </div>
      ${editingId===item.id
        ?`<input class="hist-name-input" id="rename-${item.id}" value="${escHtml(item.name)}"
            onkeydown="onRenameKey(event,${item.id})" onblur="saveRename(${item.id})" onclick="event.stopPropagation()">`
        :`<div class="hist-name">${escHtml(item.name)}</div>`}
    </div>`;
  }).join("");
  if (editingId) { const inp=document.getElementById(`rename-${editingId}`); if(inp){inp.focus();inp.select();} }
}

function loadItem(id) {
  if (editingId) return;
  const item = history.find(h=>h.id===id); if(!item) return;
  modIdx=item.modIdx; messages=item.messages?[...item.messages]:[];
  convo=item.convo?[...item.convo]:[]; cleanMode=item.cleanMode; activeId=id;
  clearImage(); document.getElementById("input-box").value="";
  renderTabs(); applyModule(); renderConvo(); renderHistory();
  document.getElementById("clean-btn").textContent=cleanMode?"⚡ Чистий":"📝 Детально";
  document.getElementById("clean-btn").classList.toggle("on",cleanMode);
  if(window.innerWidth<640) toggleHistory();
}
function deleteItem(e,id) {
  e.stopPropagation();
  history=history.filter(h=>h.id!==id);
  if(activeId===id) newConvo(); saveHistory(); renderHistory();
}
function startRename(e,id) { e.stopPropagation(); editingId=id; renderHistory(); }
function onRenameKey(e,id) { if(e.key==="Enter"){e.preventDefault();saveRename(id);} if(e.key==="Escape"){editingId=null;renderHistory();} }
function saveRename(id) {
  const inp=document.getElementById(`rename-${id}`);
  if(inp&&inp.value.trim()){ const item=history.find(h=>h.id===id); if(item)item.name=inp.value.trim(); saveHistory(); }
  editingId=null; renderHistory();
}

// ── NEW CONVERSATION ──────────────────────────────────────────────────────────
function newConvo() {
  if(currentAudio){currentAudio.pause();currentAudio=null;}
  messages=[]; convo=[]; activeId=null; ttsState={};
  clearImage(); document.getElementById("input-box").value="";
  renderConvo(); applyModule();
}

// ── SEND ──────────────────────────────────────────────────────────────────────
async function send() {
  const input = document.getElementById("input-box").value.trim();
  if((!input&&!imageB64)||loading) return;

  const convId = activeId||Date.now();
  if(!activeId) activeId=convId;
  loading=true; updateSendBtn();

  const txt=input, hasImg=!!imageB64;
  const snapB64=imageB64, snapMime=imageMime;

  document.getElementById("input-box").value="";
  clearImage();

  const currentTurn = {role:"user",text:txt||"Analyze this image.",image_b64:snapB64||null,image_mime:snapMime||null};
  messages.push({role:"user",text:txt||"Analyze this image.",image_b64:null,image_mime:null});
  convo.push({userText:txt,hasImage:hasImg,assistantText:null});
  renderConvo();

  const apiMessages = [...messages.slice(0,-1), currentTurn];

  try {
    const res = await fetch(`${API}/api/chat`,{
      method:"POST", headers:{"Content-Type":"application/json"},
      body:JSON.stringify({module:MODULES[modIdx].id,messages:apiMessages,clean_mode:cleanMode}),
    });
    const data = await res.json();
    const text = data.text||"Помилка відповіді.";
    messages.push({role:"model",text});
    convo[convo.length-1].assistantText=text;
    renderConvo();

    const existing=history.find(h=>h.id===convId);
    const exchange={userText:txt,hasImage:hasImg,assistantText:text};
    if(existing){existing.messages=[...messages];existing.convo.push(exchange);}
    else{
      history.unshift({id:convId,modIdx,name:(txt||"Фото").slice(0,45),
        messages:[...messages],convo:[exchange],cleanMode,
        time:new Date().toLocaleTimeString("uk",{hour:"2-digit",minute:"2-digit"})});
    }
    saveHistory(); renderHistory();
  } catch(err) {
    convo[convo.length-1].assistantText=`⚠️ Помилка: ${err.message}`;
    renderConvo();
  }
  loading=false; updateSendBtn(); applyModule();
}

// ── RENDER CONVERSATION ───────────────────────────────────────────────────────
function renderConvo() {
  const el=document.getElementById("convo");
  const meta=document.getElementById("convo-meta");
  const m=MODULES[modIdx];

  if(!convo.length) {
    el.innerHTML=`<div class="empty">
      <div class="empty-icon">${m.icon}</div>
      <div class="empty-title" style="color:${m.color}">${m.label}</div>
      <div class="empty-hint">${HINTS[modIdx]}</div>
      <div class="empty-key">Ctrl+Enter для надсилання</div>
    </div>`;
    meta.style.display="none";
    document.getElementById("input-box").rows=4;
    return;
  }

  el.innerHTML=convo.map((ex,i)=>`
    <div class="exchange">
      <div class="user-bubble">
        <div class="user-bubble-inner">
          ${ex.hasImage?'<div style="font-size:.72rem;color:var(--t3);margin-bottom:.25rem">📎 Зображення</div>':""}
          ${ex.userText?`<div class="user-text">${escHtml(ex.userText)}</div>`:""}
        </div>
      </div>
      ${ex.assistantText===null&&i===convo.length-1
        ?`<div class="dots">
            <div class="dot" style="background:${m.color};animation-delay:0s"></div>
            <div class="dot" style="background:${m.color};animation-delay:.18s"></div>
            <div class="dot" style="background:${m.color};animation-delay:.36s"></div>
          </div>`
        :ex.assistantText
          ?`<div class="assistant-card">
              <div class="assistant-head">
                <span style="font-size:.7rem">${m.icon}</span>
                <span class="assistant-head-mod" style="color:${m.color}">${m.label}</span>
                ${cleanMode?'<span class="clean-badge">⚡ Чистий</span>':""}
              </div>
              <div class="assistant-body">${renderContent(ex.assistantText, i)}</div>
              <div class="action-bar">
                <button class="act-btn" id="copy-btn-${i}" onclick="copyResponse(${i})">📋 Копіювати</button>
                ${m.tts?`<button class="act-btn" id="tts-toggle-${i}" onclick="toggleTts(${i})">🔊 Озвучити</button>`:""}
              </div>
              ${m.tts?renderTtsPanel(i):""}
            </div>`
          :""}
    </div>`).join("");

  meta.style.display="flex";
  document.getElementById("turn-count").textContent=`${convo.length} ${convo.length===1?"повідомлення":"повідомлень"}`;
  document.getElementById("input-box").rows=2;
  el.scrollTop=el.scrollHeight;
}

// ── RENDER CONTENT (normal md or clean-translation) ──────────────────────────
function renderContent(text, idx) {
  // Clean mode translation: parse "word - translation" lines
  if (cleanMode && modIdx===1) {
    return renderCleanTranslation(text);
  }
  return `<div class="md">${renderMD(text)}</div>`;
}

function renderCleanTranslation(text) {
  // Parse lines of "X - Y" format
  const lines = text.trim().split("\n").filter(l=>l.trim());
  const items = lines.map(line => {
    // Match "something - something" or "something → something"
    const m = line.match(/^(.+?)\s*[-–—→]\s*(.+)$/);
    if (m) {
      return `<div class="tr-line">
        <span class="tr-en">${escHtml(m[1].trim())}</span>
        <span class="tr-dash">—</span>
        <span class="tr-uk">${escHtml(m[2].trim())}</span>
      </div>`;
    }
    // Plain line (e.g. base form note)
    return `<div style="font-size:.8rem;color:var(--t3);padding:.15rem 0;font-style:italic">${escHtml(line)}</div>`;
  });
  return `<div class="clean-trans">${items.join("")}</div>`;
}

// ── TTS PANEL ─────────────────────────────────────────────────────────────────
function renderTtsPanel(idx) {
  const voiceOptions = Object.entries(ttsVoices).map(([id,label])=>
    `<option value="${id}" ${id==="en-GB-RyanNeural"?"selected":""}>${label}</option>`
  ).join("") || `<option value="en-GB-RyanNeural">🇬🇧 Ryan (UK, Male)</option>
   <option value="en-US-JennyNeural">🇺🇸 Jenny (US, Female)</option>
   <option value="en-AU-NatashaNeural">🇦🇺 Natasha (AU, Female)</option>`;

  return `<div class="tts-panel" id="tts-panel-${idx}">
    <div class="tts-row">
      <span class="tts-label">Голос</span>
      <select class="tts-select" id="tts-voice-${idx}">${voiceOptions}</select>
    </div>
    <div class="tts-row">
      <span class="tts-label">Темп</span>
      <input type="range" class="tts-range" id="tts-rate-${idx}" min="-50" max="50" value="0" step="5"
        oninput="document.getElementById('tts-rate-val-${idx}').textContent=this.value+'%'">
      <span class="tts-val" id="tts-rate-val-${idx}">0%</span>
    </div>
    <div class="tts-row">
      <span class="tts-label">Висота</span>
      <input type="range" class="tts-range" id="tts-pitch-${idx}" min="-20" max="20" value="0" step="2"
        oninput="document.getElementById('tts-pitch-val-${idx}').textContent=this.value+'Hz'">
      <span class="tts-val" id="tts-pitch-val-${idx}">0Hz</span>
    </div>
    <div class="tts-row">
      <button class="tts-play" id="tts-play-${idx}" onclick="playTts(${idx})"
        style="background:var(--accent,#fb923c)">▶ Відтворити</button>
      <button class="tts-stop" id="tts-stop-${idx}" onclick="stopTts()">■ Стоп</button>
      <button class="act-btn" id="tts-dl-${idx}" onclick="downloadTts(${idx})"
        style="display:none;margin-left:auto">⬇ Скачати MP3</button>
    </div>
  </div>`;
}

function toggleTts(idx) {
  const panel = document.getElementById(`tts-panel-${idx}`);
  if (!panel) return;
  const isOpen = panel.classList.contains("open");
  // Close all panels first
  document.querySelectorAll(".tts-panel").forEach(p=>p.classList.remove("open"));
  document.querySelectorAll(".act-btn[id^='tts-toggle']").forEach(b=>{b.textContent="🔊 Озвучити";});
  if (!isOpen) {
    panel.classList.add("open");
    document.getElementById(`tts-toggle-${idx}`).textContent="▲ Сховати";
  }
}

async function playTts(idx) {
  const text = convo[idx]?.assistantText;
  if (!text) return;

  const voice  = document.getElementById(`tts-voice-${idx}`)?.value  || "en-GB-RyanNeural";
  const rateV  = document.getElementById(`tts-rate-${idx}`)?.value   || "0";
  const pitchV = document.getElementById(`tts-pitch-${idx}`)?.value  || "0";
  const rate   = (parseInt(rateV)>=0?"+":"")+rateV+"%";
  const pitch  = (parseInt(pitchV)>=0?"+":"")+pitchV+"Hz";

  const playBtn = document.getElementById(`tts-play-${idx}`);
  const stopBtn = document.getElementById(`tts-stop-${idx}`);
  if (currentAudio) { currentAudio.pause(); currentAudio=null; }

  playBtn.disabled=true; playBtn.textContent="⏳ Генерую...";
  stopBtn.style.display="inline-block";

  try {
    const res = await fetch(`${API}/api/tts`,{
      method:"POST", headers:{"Content-Type":"application/json"},
      body:JSON.stringify({text,voice,rate,pitch}),
    });
    if(!res.ok) throw new Error(await res.text());
    const blob = await res.blob();
    const url  = URL.createObjectURL(blob);
    // Store for download
    if (!window._ttsBlobs) window._ttsBlobs = {};
    window._ttsBlobs[idx] = url;
    const dlBtn = document.getElementById(`tts-dl-${idx}`);
    if (dlBtn) dlBtn.style.display = "inline-flex";

    currentAudio = new Audio(url);
    currentAudio.play();
    playBtn.disabled=false; playBtn.textContent="⏸ Пауза";

    currentAudio.onended = ()=>{ playBtn.textContent="▶ Відтворити"; stopBtn.style.display="none"; };
    currentAudio.onclick = ()=>{ /* pause handled by button */ };

    // Toggle pause/play
    playBtn.onclick = ()=>{
      if(currentAudio.paused){ currentAudio.play(); playBtn.textContent="⏸ Пауза"; }
      else{ currentAudio.pause(); playBtn.textContent="▶ Продовжити"; }
    };
  } catch(err) {
    playBtn.disabled=false; playBtn.textContent="▶ Відтворити"; stopBtn.style.display="none";
    showToast(`TTS помилка: ${err.message}`);
    // Reset onclick
    playBtn.onclick = ()=>playTts(idx);
  }
}

function stopTts() {
  if(currentAudio){currentAudio.pause();currentAudio.currentTime=0;currentAudio=null;}
  document.querySelectorAll(".tts-play").forEach(b=>b.textContent="▶ Відтворити");
  document.querySelectorAll(".tts-stop").forEach(b=>b.style.display="none");
}

function downloadTts(idx) {
  const url = window._ttsBlobs?.[idx];
  if (!url) { showToast("Спочатку згенеруйте аудіо"); return; }
  const voice = document.getElementById(`tts-voice-${idx}`)?.value || "audio";
  const name  = `ielts_shadowing_${voice}_${idx}.mp3`;
  const a = document.createElement("a");
  a.href = url; a.download = name;
  a.click();
}

// ── COPY ─────────────────────────────────────────────────────────────────────
async function copyResponse(idx) {
  const text = convo[idx]?.assistantText;
  if (!text) return;
  try {
    await navigator.clipboard.writeText(text);
    const btn = document.getElementById(`copy-btn-${idx}`);
    btn.textContent="✅ Скопійовано";
    btn.classList.add("copied");
    setTimeout(()=>{ btn.textContent="📋 Копіювати"; btn.classList.remove("copied"); }, 2000);
  } catch { showToast("Не вдалося скопіювати"); }
}

// ── MARKDOWN ──────────────────────────────────────────────────────────────────
function renderMD(text) {
  let out="";
  for(const line of text.split("\n")){
    if(!line.trim()){out+="<div style='height:.35rem'></div>";continue;}
    if(line.startsWith("### ")){out+=`<h3>${inB(line.slice(4))}</h3>`;continue;}
    if(line.startsWith("## ")) {out+=`<h2>${inB(line.slice(3))}</h2>`;continue;}
    if(line.startsWith("# "))  {out+=`<h1>${inB(line.slice(2))}</h1>`;continue;}
    if(line.startsWith("---")) {out+="<hr>";continue;}
    const bm=line.match(/^[-•*]\s+(.+)/);
    if(bm){out+=`<div class="li"><span class="li-bullet">▸</span><span>${inB(bm[1])}</span></div>`;continue;}
    const nm=line.match(/^(\d+)\.\s+(.+)/);
    if(nm){out+=`<div class="li"><span class="li-num">${nm[1]}.</span><span>${inB(nm[2])}</span></div>`;continue;}
    out+=`<p>${inB(line)}</p>`;
  }
  return out;
}
function inB(s){ return escHtml(s).replace(/\*\*(.*?)\*\*/g,"<strong>$1</strong>"); }
function escHtml(s){ return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;"); }

// ── SEND BUTTON ───────────────────────────────────────────────────────────────
function updateSendBtn(){
  const btn=document.getElementById("send-btn");
  const hasInput=!!document.getElementById("input-box").value.trim()||!!imageB64;
  btn.disabled=loading||!hasInput;
  btn.textContent=loading?"⏳":convo.length?"Уточнити →":"Запитати →";
}

// ── IMAGE ─────────────────────────────────────────────────────────────────────
function onFileSelect(e){ const f=e.target.files[0]; if(f)readImg(f); e.target.value=""; }
function readImg(file){
  const r=new FileReader();
  r.onload=ev=>{
    const[header,b64]=ev.target.result.split(",");
    imageB64=b64; imageMime=file.type;
    document.getElementById("img-thumb").src=ev.target.result;
    document.getElementById("img-preview").style.display="flex";
    updateSendBtn();
  };
  r.readAsDataURL(file);
}
function clearImage(){
  imageB64=null;imageMime=null;
  document.getElementById("img-preview").style.display="none";
  document.getElementById("img-thumb").src="";
}
document.addEventListener("paste",e=>{
  for(const item of(e.clipboardData?.items||[]))
    if(item.type.startsWith("image/")){readImg(item.getAsFile());e.preventDefault();break;}
});

// ── KEYBOARD ──────────────────────────────────────────────────────────────────
function onKey(e){ if(e.key==="Enter"&&(e.ctrlKey||e.metaKey)){e.preventDefault();send();} updateSendBtn(); }

// ── TOAST ─────────────────────────────────────────────────────────────────────
function showToast(msg, dur=4000){
  const t=document.createElement("div");
  t.textContent=msg;
  Object.assign(t.style,{position:"fixed",bottom:"1.5rem",left:"50%",transform:"translateX(-50%)",
    background:"#1e293b",color:"#e2e8f0",padding:".6rem 1.2rem",borderRadius:"10px",
    fontSize:".8rem",zIndex:999,whiteSpace:"nowrap",boxShadow:"0 4px 12px rgba(0,0,0,.4)"});
  document.body.appendChild(t);
  setTimeout(()=>t.remove(), dur);
}

document.getElementById("input-box").addEventListener("input", updateSendBtn);
init();
</script>
